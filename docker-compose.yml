name: priorities-tracker

services:

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: priorities-tracker-api
    ports:
      - "8089:8000"
    volumes:
      - ./apps/backend:/app
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - priorities-net
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: priorities-tracker-frontend
    ports:
      - "8901:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - priorities-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: priorities-tracker-postgres
    ports:
      - "5633:5432"
    volumes:
      - priorities-tracker_postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - priorities-net
    restart: unless-stopped

volumes:
  priorities-tracker_postgres-data:

networks:
  priorities-net:
    driver: bridge
