[tool.ruff]
target-version = "py313"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["src"]
addopts = "-v --tb=short"
markers = [
    "integration: marks tests that require a real database",
    "e2e: marks end-to-end tests",
    "slow: marks slow tests",
]
